name: QA Automation CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *"   # nightly full run at 02:00 UTC

jobs:
  # --------------------------------------------------------------------------
  # Runs on every push/PR. Proves the framework is healthy WITHOUT needing a
  # live deployment: dependencies install, all modules import, and the full
  # test suite is discoverable and correctly wired (markers, fixtures, POMs).
  # --------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browser
        run: playwright install --with-deps chromium
      - name: Syntax / import check
        run: python -m compileall -q core pages api utils config conftest.py tests
      - name: Test discovery (collect the full suite)
        run: pytest --collect-only -q

  # --------------------------------------------------------------------------
  # Live cross-browser run. Requires a real deployment + credentials, so it is
  # OPT-IN: set repository variable RUN_LIVE_TESTS=true (and add the secrets
  # below) to enable it. Skipped by default so pushes stay green.
  # --------------------------------------------------------------------------
  cross-browser:
    needs: validate
    if: ${{ vars.RUN_LIVE_TESTS == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        tenant: [company1, company2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps ${{ matrix.browser }}
      - name: Run API + UI + integration
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        run: >
          pytest -m "api or ui or integration"
          --browser-name=${{ matrix.browser }}
          --tenant=${{ matrix.tenant }}
          -n 2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.browser }}-${{ matrix.tenant }}
          path: reports/

  # --------------------------------------------------------------------------
  # Live mobile run on BrowserStack real devices. Opt-in + nightly only.
  # --------------------------------------------------------------------------
  mobile-browserstack:
    needs: validate
    if: ${{ vars.RUN_LIVE_TESTS == 'true' && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [android, ios]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Run mobile flow on BrowserStack
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          TEST_TARGET: browserstack
        run: >
          pytest -m mobile
          --target=browserstack
          --bstack-profile=${{ matrix.profile }}
