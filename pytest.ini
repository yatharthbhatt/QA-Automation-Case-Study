[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — keeps `pytest -m ...` selection explicit and self-documenting
markers =
    api: pure API-layer tests (no browser)
    ui: browser UI tests
    integration: cross-layer API + UI + mobile flows
    smoke: fast critical-path subset for PR gating
    security: tenant-isolation / auth-boundary tests
    mobile: requires a mobile device (BrowserStack)
    role(name): run the test as a specific user role (admin/manager/employee)

# Default reporting: verbose, HTML + JUnit, short tracebacks
addopts =
    -v
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --junitxml=reports/junit.xml
    --tb=short

# Log capture
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
